<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Mode Toggle — crash-lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.3s ease, color 0.3s ease;
    }

    :root[data-theme="light"] {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #111111;
      --subtext: #555555;
      --toggle-bg: #dddddd;
      --toggle-knob: #111111;
    }

    :root[data-theme="dark"] {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --text: #f5f5f5;
      --subtext: #aaaaaa;
      --toggle-bg: #333333;
      --toggle-knob: #f5f5f5;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: var(--card);
      padding: 2.5rem 3rem;
      border-radius: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 100%;
    }

    .emoji {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    p {
      font-size: 0.9rem;
      color: var(--subtext);
      margin-bottom: 2rem;
    }

    /* Toggle Switch */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .toggle-label {
      font-size: 0.85rem;
      color: var(--subtext);
    }

    .toggle {
      width: 52px;
      height: 28px;
      background: var(--toggle-bg);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--toggle-knob);
      border-radius: 50%;
      top: 4px;
      left: 4px;
      transition: transform 0.3s ease;
    }

    [data-theme="dark"] .toggle::after {
      transform: translateX(24px);
    }

    .tag {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--subtext);
    }

    .tag span {
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji" id="emoji">☀️</div>
    <h1 id="title">Light Mode</h1>
    <p>Clean. Minimal. Just vibes.</p>

    <div class="toggle-wrapper">
      <span class="toggle-label">Light</span>
      <button class="toggle" id="toggle" aria-label="Toggle dark mode"></button>
      <span class="toggle-label">Dark</span>
    </div>

    <p class="tag">experiment 001 — <span>crash-lab</span></p>
  </div>

  <script>
    const toggle = document.getElementById('toggle');
    const root = document.documentElement;
    const emoji = document.getElementById('emoji');
    const title = document.getElementById('title');

    toggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      root.setAttribute('data-theme', isDark ? 'light' : 'dark');
      emoji.textContent = isDark ? '☀️' : '🌙';
      title.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    });
  </script>

</body>
</html>
